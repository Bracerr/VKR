services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wh
      POSTGRES_PASSWORD: wh
      POSTGRES_DB: warehouse
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wh -d warehouse"]
      interval: 5s
      timeout: 3s
      retries: 10

  warehouse-service:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure:5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CONFIG_PATH: /app/configs/docker.yaml
      DB_DSN: postgres://wh:wh@postgres:5432/warehouse?sslmode=disable
      # Должен совпадать с WAREHOUSE_SERVICE_SECRET у sed-service / production / procurement.
      SERVICE_SECRET: ${WAREHOUSE_SERVICE_SECRET:-e2e-warehouse-service-secret}
    ports:
      - "8090:8090"
