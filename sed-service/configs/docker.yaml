http_addr: ":8091"
log_level: "info"
# В Docker задавайте через ENV `DB_DSN` (см. VKR/.env.example и compose).
db_dsn: ""
keycloak_url: "http://host.docker.internal:8081"
keycloak_realm: "industrial-sed"
keycloak_client_id: "auth-service"
run_migrations_on_start: true
rate_limit_per_minute: 120

minio_endpoint: "minio:9000"
# Ключи MinIO — только через ENV `MINIO_ACCESS_KEY` / `MINIO_SECRET_KEY` в compose.
minio_access_key: ""
minio_secret_key: ""
minio_bucket: "sed-files"
minio_use_ssl: false

warehouse_base_url: "http://host.docker.internal:8090"
# warehouse_service_secret задаётся через ENV WAREHOUSE_SERVICE_SECRET
