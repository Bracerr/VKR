# Подключайте вторым файлом compose на хостах без x86-64-v2 (старый CPU / qemu64 и т.п.):
#   LEGACY_CPU=1 make prod-up
# или:
#   docker compose ... -f sed-service/e2e_tests/docker-compose.test.yml \
#     -f sed-service/e2e_tests/docker-compose.legacy-cpu.yml ...
#
# Keycloak: <21 на базе UBI8. MinIO: вариант с суффиксом -cpuv1 (см. minio/minio на Docker Hub).

services:
  keycloak:
    image: quay.io/keycloak/keycloak:20.0.5
  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z-cpuv1
