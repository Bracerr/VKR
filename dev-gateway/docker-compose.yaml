# Шлюз для локальной разработки: единый http://localhost:8080 для ds-erp-client.
# Перед запуском поднимите auth-service (порт auth на хосте 18080), warehouse, sed, production, procurement.

services:
  gateway:
    image: nginx:1.26-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
