basePath: /
definitions:
  handlers.BootstrapEntAdminRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
      username:
        maxLength: 64
        minLength: 1
        type: string
    required:
    - email
    - password
    - username
    type: object
  handlers.CreateTenantRequest:
    properties:
      code:
        maxLength: 64
        minLength: 2
        type: string
      name:
        maxLength: 255
        type: string
    required:
    - code
    - name
    type: object
  handlers.CreateUserRequest:
    properties:
      email:
        type: string
      role:
        type: string
      username:
        maxLength: 64
        minLength: 1
        type: string
    required:
    - email
    - role
    - username
    type: object
  handlers.TestLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.UpdateRolesRequest:
    properties:
      roles:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - roles
    type: object
  httpx.ErrorBody:
    properties:
      code:
        type: integer
      error:
        type: string
    type: object
  models.Tenant:
    properties:
      code:
        type: string
      created_at:
        type: string
      keycloak_group_id:
        type: string
      name:
        type: string
    type: object
  models.UserCache:
    properties:
      created_at:
        type: string
      email:
        type: string
      keycloak_id:
        type: string
      roles:
        items:
          type: string
        type: array
      tenant_code:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  usecases.UserInfoDTO:
    properties:
      email:
        type: string
      roles:
        items:
          type: string
        type: array
      tenant_id:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Микросервис авторизации и управления пользователями (мультитенантность
    Keycloak).
  title: Auth Service API
  version: "1.0"
paths:
  /api/v1/auth/callback:
    get:
      responses:
        "302":
          description: Found
      summary: OIDC callback
      tags:
      - auth
  /api/v1/auth/login:
    get:
      parameters:
      - description: путь на фронте после входа
        in: query
        name: return_to
        type: string
      responses:
        "302":
          description: Found
      summary: Начать вход (OIDC code + PKCE)
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Выход
      tags:
      - auth
  /api/v1/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecases.UserInfoDTO'
      security:
      - BearerAuth: []
      summary: Профиль по JWT
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      responses:
        "204":
          description: No Content
      summary: Обновить access token
      tags:
      - auth
  /api/v1/internal/test/cleanup:
    delete:
      parameters:
      - description: секрет
        in: header
        name: X-Test-Secret
        required: true
        type: string
      - description: префикс кода тенанта (по умолчанию test_)
        in: query
        name: prefix
        type: string
      responses:
        "204":
          description: No Content
      summary: Очистка тестовых данных
      tags:
      - internal-test
  /api/v1/internal/test/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: секрет
        in: header
        name: X-Test-Secret
        required: true
        type: string
      - description: учётные данные
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.TestLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Тестовый логин (password grant)
      tags:
      - internal-test
  /api/v1/internal/userinfo:
    get:
      parameters:
      - description: секрет сервиса
        in: header
        name: X-Service-Secret
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecases.UserInfoDTO'
      summary: Userinfo (X-Service-Secret + JWT пользователя)
      tags:
      - internal
  /api/v1/tenants:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Tenant'
            type: array
      security:
      - BearerAuth: []
      summary: Список предприятий (super_admin)
      tags:
      - tenants
    post:
      consumes:
      - application/json
      parameters:
      - description: данные
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateTenantRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Tenant'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ErrorBody'
      security:
      - BearerAuth: []
      summary: Создать предприятие (super_admin)
      tags:
      - tenants
  /api/v1/tenants/{code}:
    delete:
      parameters:
      - description: код предприятия
        in: path
        name: code
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Удалить предприятие (super_admin)
      tags:
      - tenants
  /api/v1/tenants/{code}/ent-admin:
    post:
      consumes:
      - application/json
      parameters:
      - description: код тенанта
        in: path
        name: code
        required: true
        type: string
      - description: данные
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.BootstrapEntAdminRequest'
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Bootstrap первого администратора предприятия
      tags:
      - tenants
  /api/v1/users:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.UserCache'
            type: array
      security:
      - BearerAuth: []
      summary: Список пользователей (ent_admin)
      tags:
      - users
    post:
      consumes:
      - application/json
      parameters:
      - description: данные
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Создать пользователя (ent_admin)
      tags:
      - users
  /api/v1/users/{id}:
    delete:
      parameters:
      - description: Keycloak user id
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Удалить пользователя (ent_admin)
      tags:
      - users
  /api/v1/users/{id}/roles:
    put:
      consumes:
      - application/json
      parameters:
      - description: Keycloak user id
        in: path
        name: id
        required: true
        type: string
      - description: роли
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateRolesRequest'
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Изменить роли пользователя (ent_admin)
      tags:
      - users
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness
      tags:
      - system
  /ready:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/httpx.ErrorBody'
      summary: Readiness
      tags:
      - system
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
