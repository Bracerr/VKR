# Изолированный стенд для pytest (порты не пересекаются с dev docker-compose).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 3s
      timeout: 3s
      retries: 15

  keycloak:
    image: quay.io/keycloak/keycloak:20.0.5
    command: ["start-dev", "--http-enabled=true", "--hostname-strict=false"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "18081:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 3s
      retries: 36
      start_period: 120s

  auth-service:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: on-failure:5
    environment:
      HTTP_ADDR: ":8080"
      LOG_LEVEL: debug
      DB_DSN: postgres://auth:auth@postgres:5432/auth?sslmode=disable
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:18081
      KEYCLOAK_ADMIN_REALM: master
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_REALM: industrial-sed
      KEYCLOAK_CLIENT_ID: auth-service
      KEYCLOAK_CLIENT_SECRET: dev-client-secret-change-me
      FRONTEND_URL: http://localhost:3000
      API_PUBLIC_URL: http://localhost:18080
      SERVICE_SECRET: e2e-service-secret
      TEST_SECRET: e2e-test-secret
      STATE_COOKIE_SECRET: "0123456789abcdef0123456789abcdef"
      ENABLE_TEST_ENDPOINTS: "true"
      BOOTSTRAP_SUPERADMIN: "true"
      BOOTSTRAP_SUPERADMIN_USERNAME: superadmin
      BOOTSTRAP_SUPERADMIN_PASSWORD: superadmin
      NOTIFIER_TYPE: mock
      RUN_MIGRATIONS_ON_START: "true"
      OTEL_ENABLED: "false"
    ports:
      - "18080:8080"
