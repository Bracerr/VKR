# Локальная разработка: PostgreSQL + Keycloak + auth-service.
# Запуск: docker compose up -d --build
# Kafka (опционально): docker compose --profile kafka up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: ${PG_AUTH_PASSWORD:-auth}
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    command: ["start-dev", "--http-enabled=true", "--hostname-strict=false"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080"
    # Дождаться, пока HTTP действительно слушает (иначе auth-service падает на LoginAdmin).
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 3s
      retries: 36
      start_period: 120s
  zookeeper:
    profiles: ["kafka"]
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    profiles: ["kafka"]
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  auth-service:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: on-failure:5
    environment:
      # Основные (не секретные) настройки — в YAML; секреты — из корня репозитория `.env` (см. VKR/.env.example).
      CONFIG_PATH: /app/configs/docker.yaml
      DB_DSN: postgres://auth:${PG_AUTH_PASSWORD:-auth}@postgres:5432/auth?sslmode=disable
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-dev-client-secret-change-me}
      SERVICE_SECRET: ${AUTH_SERVICE_SECRET:-e2e-service-secret}
      TEST_SECRET: ${AUTH_TEST_SECRET:-e2e-test-secret}
      STATE_COOKIE_SECRET: ${AUTH_STATE_COOKIE_SECRET:-0123456789abcdef0123456789abcdef}
      BOOTSTRAP_SUPERADMIN_PASSWORD: ${AUTH_BOOTSTRAP_SUPERADMIN_PASSWORD:-superadmin}
    # Публичный API для браузера — через dev-gateway (nginx) на :8080 (см. VKR/dev-gateway).
    ports:
      - "18080:8080"
