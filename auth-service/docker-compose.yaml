# Локальная разработка: PostgreSQL + Keycloak + auth-service.
# Запуск: docker compose up -d --build
# Kafka (опционально): docker compose --profile kafka up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    command: ["start-dev", "--http-enabled=true", "--hostname-strict=false"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    # Дождаться, пока HTTP действительно слушает (иначе auth-service падает на LoginAdmin).
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 3s
      retries: 36
      start_period: 120s
  zookeeper:
    profiles: ["kafka"]
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    profiles: ["kafka"]
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  auth-service:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: on-failure:5
    environment:
      # Основные (не секретные) настройки — в YAML.
      CONFIG_PATH: /app/configs/docker.yaml
      # DSN и секреты — в `.env` (env_file).
      DB_DSN: postgres://auth:auth@postgres:5432/auth?sslmode=disable
    env_file:
      - .env
    ports:
      - "8080:8080"
