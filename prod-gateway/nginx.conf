worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /var/log/nginx/access.log combined;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $cookie_access_token $bearer_from_cookie {
        ""      "";
        default "Bearer $cookie_access_token";
    }

    map $http_authorization $merged_auth {
        default $http_authorization;
        ""      $bearer_from_cookie;
    }

    upstream auth_upstream {
        server host.docker.internal:28080;
    }
    upstream keycloak_upstream {
        server host.docker.internal:28081;
    }
    upstream warehouse_upstream {
        server host.docker.internal:28090;
    }
    upstream sed_upstream {
        server host.docker.internal:28091;
    }
    upstream prod_upstream {
        server host.docker.internal:28092;
    }
    upstream proc_upstream {
        server host.docker.internal:28093;
    }
    upstream sales_upstream {
        server host.docker.internal:28094;
    }
    upstream trace_upstream {
        server host.docker.internal:28095;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    server {
        listen 5656;
        server_name _;

        location ^~ /api/v1/auth {
            proxy_pass http://auth_upstream;
        }
        location ^~ /api/v1/tenants {
            proxy_pass http://auth_upstream;
        }
        location ^~ /api/v1/users {
            proxy_pass http://auth_upstream;
        }
        location ^~ /api/v1/internal/test {
            proxy_pass http://auth_upstream;
        }
        location = /api/v1/internal/userinfo {
            proxy_pass http://auth_upstream;
        }

        location ^~ /swagger/ {
            proxy_pass http://auth_upstream;
        }

        location ^~ /api/v1/trace/ {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://trace_upstream;
        }

        location ^~ /api/v1/customers {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://sales_upstream;
        }
        location ^~ /api/v1/sales-orders {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://sales_upstream;
        }

        location ^~ /api/v1/me/shift-tasks {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://prod_upstream;
        }
        location ^~ /api/v1/workcenters {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://prod_upstream;
        }
        location ^~ /api/v1/scrap-reasons {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://prod_upstream;
        }
        location ^~ /api/v1/boms {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://prod_upstream;
        }
        location ^~ /api/v1/routings {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://prod_upstream;
        }
        location ^~ /api/v1/orders {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://prod_upstream;
        }
        location ^~ /api/v1/shift-tasks {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://prod_upstream;
        }

        location ^~ /api/v1/suppliers {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://proc_upstream;
        }
        location ^~ /api/v1/purchase-requests {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://proc_upstream;
        }
        location ^~ /api/v1/purchase-orders {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://proc_upstream;
        }

        location ^~ /api/v1/document-types {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://sed_upstream;
        }
        location ^~ /api/v1/workflows {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://sed_upstream;
        }
        location ^~ /api/v1/workflow-steps {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://sed_upstream;
        }
        location ^~ /api/v1/documents {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://sed_upstream;
        }
        location = /api/v1/tasks {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://sed_upstream;
        }
        location ^~ /api/v1/tasks/ {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://sed_upstream;
        }

        location ^~ /api/v1/ {
            proxy_set_header Authorization $merged_auth;
            proxy_pass http://warehouse_upstream;
        }

        location = /health {
            proxy_pass http://auth_upstream;
        }
        location = /ready {
            proxy_pass http://auth_upstream;
        }

        location ^~ /realms/ {
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass http://keycloak_upstream;
        }
        location ^~ /resources/ {
            proxy_pass http://keycloak_upstream;
        }
        location ^~ /js/ {
            proxy_pass http://keycloak_upstream;
        }
        location ^~ /welcome-content/ {
            proxy_pass http://keycloak_upstream;
        }
        location ^~ /admin/ {
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass http://keycloak_upstream;
        }

        location / {
            default_type text/plain;
            return 404 "not found\n";
        }
    }
}
