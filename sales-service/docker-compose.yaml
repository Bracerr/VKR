services:
  sales-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: ${PG_SALES_PASSWORD:-sales}
      POSTGRES_DB: sales
    ports:
      - "5437:5432"
    volumes:
      - sales_pg:/var/lib/postgresql/data

  sales-service:
    build: .
    ports:
      - "8094:8094"
    environment:
      CONFIG_PATH: /app/configs/docker.yaml
      DB_DSN: postgres://sales:${PG_SALES_PASSWORD:-sales}@sales-db:5432/sales?sslmode=disable
      KEYCLOAK_URL: http://host.docker.internal:8081
      WAREHOUSE_BASE_URL: http://host.docker.internal:8090
      WAREHOUSE_SERVICE_SECRET: ${WAREHOUSE_SERVICE_SECRET:-dev-secret}
      SED_BASE_URL: http://host.docker.internal:8091
      SED_CALLBACK_VERIFY_SECRET: ${SED_CALLBACK_SALES_SECRET:-dev-secret}
    depends_on:
      - sales-db

volumes:
  sales_pg:

